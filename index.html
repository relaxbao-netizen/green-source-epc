<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>綠源EPC戰情室</title>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --accent: #059669;
  --accent2: #0ea5e9;
  --accent3: #7c3aed;
  --warn: #d97706;
  --danger: #dc2626;
  --success: #16a34a;
  --text: #0f172a;
  --muted: #64748b;
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

/* NAV */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; height: 56px; gap: 8px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 17px; font-weight: 700; color: var(--accent);
  margin-right: 16px; white-space: nowrap;
  background: none; border: none; cursor: pointer;
  padding: 6px 10px; border-radius: 8px; font-family: var(--font);
  transition: background .15s;
}
.logo:hover { background: #f0fdf4; }
.nav-btn {
  background: none; border: none; color: var(--muted);
  padding: 8px 14px; border-radius: 6px 6px 0 0; cursor: pointer;
  font-size: 13px; font-family: var(--font); transition: all .2s;
  white-space: nowrap; border-bottom: 2px solid transparent;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: #f0fdf4; color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--accent); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.clock { font-size: 12px; color: var(--muted); }
.badge-alert { background: var(--danger); color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; display: none; }

/* LAYOUT */
.page { display: none; padding: 24px; max-width: 1600px; margin: 0 auto; }
.page.active { display: block; }

/* KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card {
  border-radius: 14px; padding: 16px 18px; position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.08); cursor: default;
}
.kpi-card.clickable { cursor: pointer; transition: filter .15s, transform .15s; }
.kpi-card.clickable:hover { filter: brightness(1.06); transform: translateY(-2px); }
.kpi-card.blue   { background: #4f8fde; }
.kpi-card.green  { background: #1aaa84; }
.kpi-card.red    { background: #e84545; }
.kpi-card.orange { background: #f07820; }
.kpi-card.teal   { background: #0fb8a8; }
.kpi-card.purple { background: #7c3aed; }
.kpi-label { font-size: 12px; color: rgba(255,255,255,.9); margin-bottom: 8px; font-weight: 600; }
.kpi-value { font-size: 34px; font-weight: 800; line-height: 1; color: #fff; }
.kpi-unit  { font-size: 16px; font-weight: 600; }
.kpi-sub   { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 5px; }
.kpi-icon  { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); opacity: .3; pointer-events: none; }

/* SECTION TITLE */
.section-title {
  font-size: 14px; font-weight: 600; color: var(--muted);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* MAIN GRID */
.main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
.side-grid { display: flex; flex-direction: column; gap: 16px; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* TAIWAN MAP */
.map-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; position: relative; min-height: 520px;
}
.map-card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.map-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.taiwan-svg-wrap { position: relative; background: #bfdbfe; border-radius: 10px; }
.taiwan-svg-wrap svg { width: 100%; max-width: 380px; display: block; margin: 0 auto; }

.map-pin {
  position: absolute; transform: translate(-50%, -50%);
  cursor: pointer; z-index: 10;
}
.map-pin .dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.6);
  transition: transform .2s; position: relative;
}
.map-pin:hover .dot { transform: scale(1.5); }
.map-pin .dot.normal  { background: var(--success);  box-shadow: 0 0 8px var(--success); }
.map-pin .dot.warn    { background: var(--warn);      box-shadow: 0 0 8px var(--warn); }
.map-pin .dot.danger  { background: var(--danger);    box-shadow: 0 0 8px var(--danger); }
.map-pin .dot.done    { background: var(--accent2);   box-shadow: 0 0 8px var(--accent2); }
.map-pin .pin-label {
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
  font-size: 10px; white-space: nowrap;
  background: rgba(15,23,42,.82); color: #fff;
  padding: 2px 5px; border-radius: 3px; pointer-events: none;
}
.map-pin .dot.danger::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid var(--danger); animation: pulse 1.5s infinite; opacity: .6;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.7);opacity:0} }

/* POPUP */
.pin-popup {
  position: absolute; background: #fff; border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; min-width: 210px; z-index: 50;
  display: none; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.14);
}
.pin-popup.visible { display: block; }
.pin-popup h4 { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.pp-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
.pp-row span:last-child { color: var(--text); font-weight: 500; }
.pp-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-top: 8px; }
.pp-bar-fill { height: 100%; border-radius: 3px; }
.pp-btn {
  margin-top: 10px; width: 100%; padding: 7px; border-radius: 6px;
  border: none; background: var(--accent); color: #fff;
  font-weight: 600; cursor: pointer; font-size: 12px; font-family: var(--font);
}

/* PROGRESS ITEMS (side panel) */
.progress-item { margin-bottom: 12px; }
.progress-item:last-child { margin-bottom: 0; }
.progress-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.progress-name { color: var(--text); font-weight: 500; }
.progress-pct { font-weight: 700; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .6s; }
.fill-green  { background: linear-gradient(90deg, #16a34a, #4ade80); }
.fill-blue   { background: linear-gradient(90deg, #0ea5e9, #38bdf8); }
.fill-yellow { background: linear-gradient(90deg, #d97706, #fcd34d); }
.fill-red    { background: linear-gradient(90deg, #dc2626, #f87171); }

/* AVATAR CARD MODAL */
#avatar-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(15,23,42,.45); backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
#avatar-overlay.open { display: flex; }
#avatar-card {
  background: #fff; border-radius: 20px; padding: 32px 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  text-align: center; min-width: 200px;
  animation: modalIn .22s ease;
  position: relative;
}
.ac-close {
  position: absolute; top: 12px; right: 12px;
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: #f1f5f9; color: #64748b; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.ac-close:hover { background: #e2e8f0; }
.ac-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 800; margin: 0 auto 14px;
}
.ac-name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.ac-phone { font-size: 14px; color: var(--text2); display: flex; align-items: center; justify-content: center; gap: 6px; }
.ac-phone svg { flex-shrink: 0; }

/* HR SIDE LIST */
.hr-row-sm {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.hr-row-sm:last-child { border-bottom: none; }
.hr-avatar-sm {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.hr-name-sm { font-size: 12px; font-weight: 600; flex: 1; }
.hr-count-sm { font-size: 12px; font-weight: 700; width: 30px; text-align: right; }
.load-bar-wrap { width: 80px; }
.load-bar { height: 5px; background: var(--border); border-radius: 3px; }
.load-fill { height: 100%; border-radius: 3px; }
.overload-badge { font-size: 10px; color: var(--danger); font-weight: 700; background: #fef2f2; padding: 1px 5px; border-radius: 3px; }

/* PROGRESS PAGE TABLE */
.tab-row { display: flex; gap: 6px; margin-bottom: 16px; }
.tab-btn { padding: 6px 14px; border: none; border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--muted); font-family: var(--font); transition: all .15s; }
.tab-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
.prog-table { width: 100%; border-collapse: collapse; min-width: 800px; }
.prog-table th { text-align: left; padding: 10px 12px; font-size: 12px; color: var(--muted); border-bottom: 2px solid var(--border); white-space: nowrap; }
.prog-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.prog-table tr:hover td { background: var(--surface2); cursor: pointer; }
.prog-table tr:last-child td { border-bottom: none; }
.status-badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.s-done    { background: #e0f2fe; color: #0ea5e9; }
.s-normal  { background: #dcfce7; color: #15803d; }
.s-warn    { background: #fef9c3; color: #a16207; }
.s-danger  { background: #fee2e2; color: #b91c1c; }
.table-bar-wrap { width: 120px; }
.table-bar { height: 6px; background: var(--border); border-radius: 3px; }
.table-bar-fill { height: 100%; border-radius: 3px; }

/* HR PAGE */
.alert-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.alert-box strong { color: var(--danger); }
.hr-full-row {
  display: flex; align-items: center; gap: 14px; padding: 12px 0 12px 13px;
  border-bottom: 1px solid var(--border);
}
.hr-full-row:last-child { border-bottom: none; }
.hr-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.hr-info { flex: 1; }
.hr-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.hr-sites-text { font-size: 11px; color: var(--muted); margin-top: 3px; }
.load-bar-full { width: 140px; }
.load-bar-full .load-bar { height: 6px; }
.hr-case-count { font-size: 13px; font-weight: 700; width: 40px; text-align: right; }
.hr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
.hr-detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.hr-detail-card.overloaded { border-color: #ef4444; border-width: 2px; }
.hr-full-row.overloaded { border-left: 3px solid #ef4444; padding-left: 10px; }
.hd-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.hd-name { font-size: 15px; font-weight: 700; flex: 1; }
.hd-overload { font-size: 11px; color: var(--danger); background: #fef2f2; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.hd-site-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.hd-site-row:last-child { margin-bottom: 0; }
.hd-site-name { font-size: 13px; flex: 1; }
.hd-pct { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }
.hd-bar-wrap { width: 100px; }
.hd-bar { height: 5px; background: var(--border); border-radius: 3px; }
.hd-fill { height: 100%; border-radius: 3px; }

/* ADVANCED PAGE */
.region-kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.region-kpi-card { border-radius: 14px; padding: 20px 22px; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); cursor: pointer; transition: filter .15s, transform .15s; }
.region-kpi-card:hover { filter: brightness(1.08); transform: translateY(-2px); }
.rkpi-region { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.rkpi-mw { font-size: 40px; font-weight: 800; line-height: 1; }
.rkpi-unit { font-size: 18px; font-weight: 600; }
.owner-section { margin-top: 24px; }
.owner-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.owner-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.owner-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
.owner-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.owner-mw { font-size: 28px; font-weight: 800; color: var(--accent2); line-height: 1; }
.owner-mw-unit { font-size: 14px; font-weight: 600; }
.owner-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(15,23,42,.45); backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 16px; width: 700px; max-width: 95vw;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  animation: modalIn .22s ease;
}
@keyframes modalIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.modal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: #fff;
  border-radius: 16px 16px 0 0; z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: #f1f5f9; color: var(--muted); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #e2e8f0; }
.modal-body { padding: 20px 24px 24px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.modal-info { background: #f8fafc; border-radius: 10px; padding: 16px; }
.modal-info-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
.info-row { display: flex; align-items: baseline; gap: 20px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); white-space: nowrap; min-width: 96px; flex-shrink: 0; }
.info-val { font-weight: 500; }
.modal-progress-box { background: #f8fafc; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.big-pct { font-size: 52px; font-weight: 800; line-height: 1; }
.big-pct-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
.wbs-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.wbs-table { width: 100%; border-collapse: collapse; }
.wbs-table th { text-align: left; padding: 8px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
.wbs-table td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
.wbs-table tr:last-child td { border-bottom: none; }
.wbs-mini-wrap { width: 100px; }
.wbs-mini-bar { height: 5px; background: var(--border); border-radius: 3px; }
.wbs-mini-fill { height: 100%; border-radius: 3px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn-sec { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text); font-size: 13px; cursor: pointer; font-family: var(--font); }
.btn-pri { padding: 8px 20px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); }

/* SVG MAP styles */
#taiwan-map { background: #bfdbfe; border-radius: 10px; }
#taiwan-map .cn { fill: #dde3ec !important; stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: opacity .18s; }
#taiwan-map .cn:hover { opacity: .78; }
#taiwan-map .lbl { font-size: 7.5px; fill: #475569; font-family: sans-serif; text-anchor: middle; pointer-events: none; font-weight: 700; }
#taiwan-map .lbl-e { fill: #475569; }
#taiwan-map .lbl-s { fill: #475569; }

.scroll-x { overflow-x: auto; }

/* KPI LIST MODAL */
.kpi-list-box {
  background: #fff; border-radius: 16px; width: 500px; max-width: 95vw;
  max-height: 82vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  animation: modalIn .22s ease;
}
.kpi-list-body { padding: 8px 24px 24px; }
.kpi-list-item {
  padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s; border-radius: 6px;
}
.kpi-list-item:last-child { border-bottom: none; }
.kpi-list-item:hover { background: #f8fafc; padding-left: 6px; }
.kli-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.kli-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.kli-name { font-size: 15px; font-weight: 700; flex: 1; }
.kli-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; padding-left: 17px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.kli-meta span { display: inline-flex; align-items: center; gap: 5px; }
.kli-meta span::before { content: '·'; color: #cbd5e1; }
.kli-bar-row { display: flex; align-items: center; gap: 10px; padding-left: 17px; }
.kli-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
.kli-bar-fill { height: 100%; border-radius: 3px; }
.kli-pct { font-size: 13px; font-weight: 700; width: 38px; text-align: right; }

@media(max-width:960px) {
  .kpi-row { grid-template-columns: repeat(3,1fr); }
  .main-grid { grid-template-columns: 1fr; }
  .hr-grid { grid-template-columns: 1fr; }
  .region-kpi-row { grid-template-columns: repeat(2,1fr); }
  .owner-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<nav>
  <button class="logo" onclick="showPage('home')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    綠源EPC戰情室
  </button>
  <button class="nav-btn active" data-page="home"    onclick="showPage('home',this)">🏠 首頁總覽</button>
  <button class="nav-btn"        data-page="progress" onclick="showPage('progress',this)">📊 工程進度</button>
  <button class="nav-btn"        data-page="hr"       onclick="showPage('hr',this)">👷 人力資源</button>
  <button class="nav-btn"        data-page="advanced" onclick="showPage('advanced',this)">📈 進階分析</button>
  <div class="nav-right">
    <span class="badge-alert" id="nav-badge">⚠ 2案落後</span>
    <span class="clock" id="clock"></span>
  </div>
</nav>

<!-- ===== HOME ===== -->
<div id="page-home" class="page active">
  <!-- KPI -->
  <div class="kpi-row">

// ===================== HELPERS =====================
function progressColor(pct, status) {
  if (status === 'done')   return '#0ea5e9';
  if (status === 'danger') return '#dc2626';
  if (status === 'warn')   return '#d97706';
  if (pct >= 70)           return '#16a34a';
  return '#16a34a';
}

function fillClass(status) {
  if (status === 'done')   return 'fill-blue';
  if (status === 'danger') return 'fill-red';
  if (status === 'warn')   return 'fill-yellow';
  return 'fill-green';
}

function computeWBSFromData(wbsMap, type) {
  const cats = (type === '儲能') ? wbsCats.storage : wbsCats.solar;
  return cats.map(cat => {
    let subs = [], catPct;
    if (cat.subs.length === 0) {
      catPct = wbsMap[cat.name] ?? 0;
    } else {
      subs = cat.subs.map(sub => {
        const subName = typeof sub === 'string' ? sub : sub.name;
        const subWeight = typeof sub === 'string' ? Math.round(cat.weight / cat.subs.length) : sub.weight;
        return { name: subName, pct: wbsMap[subName] ?? 0, weight: subWeight };
      });
      const totalW = subs.reduce((s, x) => s + x.weight, 0);
      catPct = totalW ? Math.round(subs.reduce((s, x) => s + x.pct * x.weight, 0) / totalW) : 0;
    }
    return { ...cat, catPct, subs };
  });
}

function computeWBS2(pct, type) {
  const cats = (type === '儲能') ? wbsCats.storage : wbsCats.solar;
  let rem = pct;
  return cats.map(cat => {
    let catPct;
    if (rem >= cat.weight)      { catPct = 100; rem -= cat.weight; }
    else if (rem > 0)           { catPct = Math.round((rem / cat.weight) * 100); rem = 0; }
    else                        { catPct = 0; }
    let subRem = catPct;
    const subs = cat.subs.map(sub => {
      const subName = typeof sub === 'string' ? sub : sub.name;
      const subW = typeof sub === 'string' ? (100 / cat.subs.length) : (sub.weight / cat.weight * 100);
      let subPct;
      if (subRem >= subW)    { subPct = 100; subRem -= subW; }
      else if (subRem > 0)   { subPct = Math.round((subRem / subW) * 100); subRem = 0; }
      else                   { subPct = 0; }
      const subWeight = typeof sub === 'string' ? Math.round(cat.weight / cat.subs.length) : sub.weight;
      return { name: subName, pct: subPct, weight: subWeight };
    });
    return { ...cat, catPct, subs };
  });
}

function wbsStatusBadge(pct) {
  if (pct === 100) return '<span style="background:#e0f2fe;color:#0ea5e9;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600">完成</span>';
  if (pct > 0)     return '<span style="background:#dcfce7;color:#15803d;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600">進行中</span>';
  return '<span style="background:#f1f5f9;color:#64748b;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600">未開始</span>';
}

function ringChart(pct, color) {
  const r = 52, cx = 65, circ = +(2 * Math.PI * r).toFixed(1);
  const offset = +(circ * (1 - pct / 100)).toFixed(1);
  return `<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="10"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cx})" stroke-linecap="round"/>
  </svg>`;
}

    <div class="modal-grid">
      <div class="modal-info" style="background:#f8fafc;border-radius:10px;padding:16px">
        <div class="info-row"><span class="info-label">業主</span><span class="info-val">${s.owner}</span></div>
        <div class="info-row"><span class="info-label">工地主任</span><span class="info-val">${s.pm}</span></div>
        <div class="info-row"><span class="info-label">案場地址</span><span class="info-val" style="font-size:12px">${s.addr}</span></div>
        <div class="info-row"><span class="info-label">類型</span><span class="info-val">${s.type}</span></div>
        ${(()=>{
          const hasPV = s.type.includes('太陽能') || s.type.includes('PV');
          const hasSt = s.type.includes('儲能');
          let r = '';
          if (hasPV) r += `<div class="info-row"><span class="info-label">光電設置容量</span><span class="info-val">${s.mw ? s.mw+' kW' : s.cap}</span></div>`;
          if (hasSt) r += `<div class="info-row"><span class="info-label">儲能設置容量</span><span class="info-val">${(s.skw||s.mwh) ? (s.skw||0)+' kW / '+(s.mwh||0)+' kWh' : s.cap}</span></div>`;
          if (!r) r = `<div class="info-row"><span class="info-label">設置容量</span><span class="info-val">${s.cap}</span></div>`;
          return r;
        })()}
        <div class="info-row"><span class="info-label">開工日期</span><span class="info-val">${s.start || ''}</span></div>
        <div class="info-row"><span class="info-label">預計完工日期</span><span class="info-val">${s.end || ''}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;border-radius:10px;padding:16px">
        ${ringChart(s.pct, pctColor)}
        <div class="big-pct" style="color:${pctColor};margin-top:2px">${s.pct}%</div>
        <div class="big-pct-label">整體施工進度</div>
      </div>
    </div>
    <div class="wbs-title" style="margin-top:20px">WBS 施工項目</div>
    <table class="wbs-table">
      <thead><tr><th>施工項目</th><th>權重</th><th>完成率</th><th>進度條</th><th>狀態</th></tr></thead>
      <tbody>${wbsRows}</tbody>
    </table>
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ===================== KPI LIST MODAL =====================
const statusDotColor = { normal:'#16a34a', warn:'#d97706', danger:'#dc2626', done:'#0ea5e9' };

function renderKPIs() {
  const active = sites.filter(s => s.status !== 'done');
  document.getElementById('kpi-active').textContent = active.length;
  document.getElementById('kpi-normal').textContent = sites.filter(s => s.status === 'normal').length;
  document.getElementById('kpi-warn').textContent   = sites.filter(s => s.status === 'warn').length;
  document.getElementById('kpi-danger').textContent = sites.filter(s => s.status === 'danger').length;
  const pvSites = sites.filter(s => s.type.includes('太陽能') || s.type === 'PV');
  const storageSites = sites.filter(s => s.type.includes('儲能'));
  const totalKw  = pvSites.reduce((sum, s) => sum + (s.mw || 0), 0);
  const totalKwh = storageSites.reduce((sum, s) => sum + (s.mwh || 0), 0);
  const totalSkw = storageSites.reduce((sum, s) => sum + (s.skw || 0), 0);
  document.getElementById('kpi-pv-cap').textContent = +totalKw.toFixed(2);
  document.getElementById('kpi-storage-cap').textContent = totalKwh;
  document.getElementById('kpi-storage-sub').textContent = 'kWh';
}
renderKPIs();

function siteCapStr(s) {
  const hasPV = s.type.includes('太陽能') || s.type === 'PV';
  const hasSt = s.type.includes('儲能');
  if (hasPV && hasSt) return (s.mw && s.mwh) ? s.mw + ' kW / ' + s.mwh + ' kWh' : '—';
  if (hasPV) return s.mw ? s.mw + ' kW' : '—';
  if (hasSt) return s.mwh ? s.mwh + ' kWh' : '—';
  return '—';
}

function openKpiList(type) {
  const titleMap = {
    active:       '執行中案場',
    normal:       '正常施工案場',
    warn:         '即將落後案場',
    danger:       '進度落後案場',
    'pv-cap':     '光電設置容量',
    'storage-cap':'儲能設置容量',
  };
  const active = sites.filter(s => s.status !== 'done');
  const filtered = type === 'active'   ? active
    : type === 'pv-cap'                ? sites.filter(s => (s.type.includes('太陽能') || s.type === 'PV') && s.mw > 0)
    : type === 'storage-cap'           ? sites.filter(s => s.type.includes('儲能') && (s.mwh > 0 || s.skw > 0))
    : sites.filter(s => s.status === type);
  const sorted = type === 'pv-cap'     ? [...filtered].sort((a,b) => b.mw - a.mw)
    : type === 'storage-cap'           ? [...filtered].sort((a,b) => b.mwh - a.mwh)
    : [...filtered].sort((a,b) => b.pct - a.pct);
  document.getElementById('kpi-list-title').textContent = `${titleMap[type]}（${sorted.length}案）`;
  document.getElementById('kpi-list-body').innerHTML = sorted.map(s => `
    <div class="kpi-list-item" onclick="closeKpiListDirect();openModal(${s.id})">
      <div class="kli-top">
        <div class="kli-dot" style="background:${statusDotColor[s.status]}"></div>
        <div class="kli-name">${s.name}</div>
        ${type === 'pv-cap' ? `<span style="font-size:13px;font-weight:700;color:#7c3aed">${s.mw}kW</span>` : ''}
        ${type === 'storage-cap' ? `<span style="font-size:13px;font-weight:700;color:#0891b2">${s.mw}kW / ${s.mwh}kWh</span>` : ''}
      </div>
      <div class="kli-meta">${s.owner}<span>${s.pm}</span>${(type==='pv-cap'||type==='storage-cap') ? (s.end ? '<span>預計完工日 '+s.end+'</span>' : '') : '<span>'+siteCapStr(s)+'</span>'+(s.end?'<span>預計完工日 '+s.end+'</span>':'')}</div>
      <div class="kli-bar-row">
        <div class="kli-bar-wrap">
          <div class="kli-bar-fill ${fillClass(s.status)}" style="width:${s.pct}%"></div>
        </div>
        <span class="kli-pct" style="color:${progressColor(s.pct,s.status)}">${s.pct}%</span>
      </div>
    </div>`).join('');
  document.getElementById('kpi-list-overlay').classList.add('open');
}

function closeKpiList(e) {
  if (e.target === document.getElementById('kpi-list-overlay')) closeKpiListDirect();
}
function closeKpiListDirect() {
  document.getElementById('kpi-list-overlay').classList.remove('open');
}

// ===================== PM MODAL =====================
function openPmModal(name) {
  const sv = supervisors.find(s => s.name === name);
  if (!sv) return;
  const pmSites = sv.sites.map(id => sites.find(s => s.id === id)).filter(Boolean);
  const sorted = [...pmSites].sort((a,b) => b.pct - a.pct);
  document.getElementById('kpi-list-title').textContent = `${name} 負責案場（${sorted.length}案）`;
  document.getElementById('kpi-list-body').innerHTML = sorted.map(s => `
    <div class="kpi-list-item" onclick="closeKpiListDirect();openModal(${s.id})">
      <div class="kli-top">
        <div class="kli-dot" style="background:${statusDotColor[s.status]}"></div>
        <div class="kli-name">${s.name}</div>
      </div>
      <div class="kli-meta">${s.owner}<span>${siteCapStr(s)}</span>${s.end ? '<span>預計完工日 '+s.end+'</span>' : ''}</div>
      <div class="kli-bar-row">
        <div class="kli-bar-wrap">
          <div class="kli-bar-fill ${fillClass(s.status)}" style="width:${s.pct}%"></div>
        </div>
        <span class="kli-pct" style="color:${progressColor(s.pct,s.status)}">${s.pct}%</span>
      </div>
    </div>`).join('');
  document.getElementById('kpi-list-overlay').classList.add('open');
}

// ===================== OWNER MODAL =====================
function openOwnerModal(owner) {
  const filtered = sites.filter(s => s.owner === owner);
  const sorted = [...filtered].sort((a,b) => b.pct - a.pct);
  const totalKw  = +filtered.reduce((s,x) => s + (x.mw  || 0), 0).toFixed(2);
  const totalKwh = +filtered.reduce((s,x) => s + (x.mwh || 0), 0).toFixed(2);
  document.getElementById('kpi-list-title').textContent = `${owner} ${sorted.length}案（${totalKw} kW / ${totalKwh} kWh）`;
  document.getElementById('kpi-list-body').innerHTML = sorted.map(s => `
    <div class="kpi-list-item" onclick="closeKpiListDirect();openModal(${s.id})">
      <div class="kli-top">
        <div class="kli-dot" style="background:${statusDotColor[s.status]}"></div>
        <div class="kli-name">${s.name}</div>
        <span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;background:${s.status==='done'?'#e0f2fe':s.status==='danger'?'#fee2e2':s.status==='warn'?'#fef3c7':'#dcfce7'};color:${s.status==='done'?'#0ea5e9':s.status==='danger'?'#dc2626':s.status==='warn'?'#d97706':'#15803d'}">${statusText[s.status]}</span>
      </div>
      <div class="kli-meta">${s.pm}<span>${siteCapStr(s)}</span>${s.end ? '<span>預計完工日 '+s.end+'</span>' : ''}</div>
      <div class="kli-bar-row">
        <div class="kli-bar-wrap">
          <div class="kli-bar-fill ${fillClass(s.status)}" style="width:${s.pct}%"></div>
        </div>
        <span class="kli-pct" style="color:${progressColor(s.pct,s.status)}">${s.pct}%</span>
      </div>
    </div>`).join('');
  document.getElementById('kpi-list-overlay').classList.add('open');
}

// ===================== REGION MODAL =====================
function openRegionModal(region, label) {
  const filtered = sites.filter(s => s.region === region);
  const sorted = [...filtered].sort((a,b) => b.pct - a.pct);
  document.getElementById('kpi-list-title').textContent = `${label}案場（${sorted.length}案）`;
  document.getElementById('kpi-list-body').innerHTML = sorted.map(s => `
    <div class="kpi-list-item" onclick="closeKpiListDirect();openModal(${s.id})">
      <div class="kli-top">
        <div class="kli-dot" style="background:${statusDotColor[s.status]}"></div>
        <div class="kli-name">${s.name}</div>
        <span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;background:${s.status==='done'?'#e0f2fe':s.status==='danger'?'#fee2e2':s.status==='warn'?'#fef3c7':'#dcfce7'};color:${s.status==='done'?'#0ea5e9':s.status==='danger'?'#dc2626':s.status==='warn'?'#d97706':'#15803d'}">${statusText[s.status]}</span>
      </div>
      <div class="kli-meta">${s.owner}<span>${s.pm}</span><span>${s.cap}</span>${s.end ? '<span>預計完工日 '+s.end+'</span>' : ''}</div>
      <div class="kli-bar-row">
        <div class="kli-bar-wrap">
          <div class="kli-bar-fill ${fillClass(s.status)}" style="width:${s.pct}%"></div>
        </div>
        <span class="kli-pct" style="color:${progressColor(s.pct,s.status)}">${s.pct}%</span>
      </div>
    </div>`).join('');
  document.getElementById('kpi-list-overlay').classList.add('open');
}

// ===================== INIT =====================
// Auto-init progress table for first load
renderProgressTable('all');

// ===================== AVATAR CARD =====================
function showAvatarCard(name, e) {
  e.stopPropagation();
  const sv = supervisors.find(s => s.name === name);
  if (!sv) return;
  const card = document.getElementById('avatar-card');
  card.innerHTML = `
    <button class="ac-close" onclick="closeAvatarCard()">✕</button>
    <div class="ac-avatar" style="background:${sv.color}22;color:${sv.color}">${sv.name[0]}</div>
    <div class="ac-name">${sv.name}</div>
    <div class="ac-phone">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.04 1.16 2 2 0 012 .01h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
      </svg>
      ${sv.phone}
    </div>`;
  document.getElementById('avatar-overlay').classList.add('open');
}

function closeAvatarCard(e) {
  if (e && e.target !== document.getElementById('avatar-overlay')) return;
  document.getElementById('avatar-overlay').classList.remove('open');
}
